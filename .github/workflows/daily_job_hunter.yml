name: Daily Job Hunt

on:
  schedule:
    - cron: '0 14 * * *' # 6am PST = 14:00 UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Fetch and Build Scripts
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: npm run run-all

      - name: Commit and push updated data
        run: |
          git config --global user.email "suman970629@gmail.com"
          git config --global user.name "suman-0216"
          git add data/ public/
          git diff --staged --quiet || git commit -m "🤖 Daily update $(date +%Y-%m-%d)"
          git push
