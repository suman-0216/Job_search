name: Daily Job Hunt (Backup Manual)

on:
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch jobs data
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          APIFY_DATASET_LIMIT: "500"
          APIFY_TIMEOUT_SECS: "480"
          APIFY_POLL_INTERVAL_MS: "4000"
          GOOGLE_ENRICH_LIMIT: "120"
          SKILL_DELAY_MS: "120"
        run: npm run fetch

      - name: Clean old data
        env:
          LATEST_JOBS_TIME: ${{ vars.LATEST_JOBS_TIME || '5' }}
          APPLIED_JOBS_TIME: ${{ vars.APPLIED_JOBS_TIME || '30' }}
        run: npm run clean

      - name: Commit and push updated data
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "Job Hunter Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Manual backup data update $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
