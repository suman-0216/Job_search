name: Daily Job Hunt

on:
  schedule:
    # Cron schedules are in UTC.
    # 6:30 AM PST is 14:30 UTC during Daylight Time
    # 9:00 AM PST is 17:00 UTC
    # 12:00 PM PST is 20:00 UTC
    - cron: '30 14 * * *'
    - cron: '0 17 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: List Environment Variables
        run: |
          echo "Listing environment variables..."
          printenv
          echo "APIFY_TOKEN is set: ${{ !!secrets.APIFY_TOKEN }}"
          echo "GOOGLE_API_KEY is set: ${{ !!secrets.GOOGLE_API_KEY }}"

      - name: Fetch jobs data (with verbose logging)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          APIFY_DATASET_LIMIT: "500"
          APIFY_TIMEOUT_SECS: "480"
          APIFY_POLL_INTERVAL_MS: "4000"
          GOOGLE_ENRICH_LIMIT: "120"
          SKILL_DELAY_MS: "120"
        run: npm run fetch || true

      - name: Clean up old data (with verbose logging)
        env:
          LATEST_JOBS_TIME: ${{ vars.LATEST_JOBS_TIME || '5' }}
          APPLIED_JOBS_TIME: ${{ vars.APPLIED_JOBS_TIME || '30' }}
        run: npm run clean || true

      - name: Commit and push updated data
        run: |
          git config user.email "actions@github.com"
          git config user.name "Job Hunter Bot"
          git add data/
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Daily data update $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "No changes to commit."
          fi
