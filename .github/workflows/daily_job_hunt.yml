name: Daily Job Hunt

on:
  schedule:
    - cron: '30 14 * * *' # 6:30 AM PST
    - cron: '30 17 * * *' # 9:30 AM PST
    - cron: '0 20 * * *'  # 12:00 PM PST
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back to the repo
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # We need full history to properly detect changes
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch jobs data
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: 'gemini-1.5-flash-preview'
        # Continue even if this step fails, so we can still try to clean old data
        continue-on-error: true
        run: node scripts/fetch_jobs.js

      - name: Clean up old data
        run: node scripts/clean_old_data.js

      - name: Commit and push updated data
        run: |
          git config --global user.name 'Job Hunter Bot'
          git config --global user.email 'actions@github.com'
          git add data/
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Daily update $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No new data to commit."
          fi
