name: Daily Job Hunt

on:
  schedule:
    # Cron schedules are UTC.
    - cron: '30 14 * * *' # 6:30 AM PT
    - cron: '0 17 * * *'  # 9:00 AM PT
    - cron: '0 20 * * *'  # 12:00 PM PT
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back to the repo
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # We need full history to properly detect changes
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch jobs data
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: 'gemini-1.5-flash-preview'
          APIFY_DATASET_LIMIT: "500"
          APIFY_TIMEOUT_SECS: "480"
          APIFY_POLL_INTERVAL_MS: "4000"
          GOOGLE_ENRICH_LIMIT: "120"
          SKILL_DELAY_MS: "120"
        run: npm run fetch

      - name: Clean up old data
        env:
          LATEST_JOBS_TIME: ${{ vars.LATEST_JOBS_TIME || '5' }}
          APPLIED_JOBS_TIME: ${{ vars.APPLIED_JOBS_TIME || '30' }}
        run: npm run clean

      - name: Sync snapshots to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run sync-supabase

      - name: Commit and push updated data
        run: |
          git config --global user.name 'Job Hunter Bot'
          git config --global user.email 'actions@github.com'
          git add data/
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Daily update $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No new data to commit."
          fi
