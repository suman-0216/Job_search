name: Manual Task Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Which task to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linkedin
          - funded
          - stealth

jobs:
  manual-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run selected task
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: 'gemini-1.5-flash-preview'
        run: node scripts/fetch_jobs.js --task=${{ inputs.task }}

      - name: Commit and push updated data
        run: |
          git config --global user.name 'Job Hunter Bot'
          git config --global user.email 'actions@github.com'
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Manual run: ${{ inputs.task }} data update"
            git push
          else
            echo "No new data to commit."
          fi
